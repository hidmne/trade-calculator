<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        input[type="number"] { background-color: #1e293b; color: #fff; border: 1px solid #334155; }
        input[type="number"]:focus { outline: none; border-color: #3b82f6; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .table-container { overflow-x: auto; }
        table { width: 100%; text-align: right; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-weight: normal; font-size: 0.875rem; }
        td { font-size: 0.95rem; }
        
        /* Custom Checkbox */
        input[type="checkbox"] {
            width: 1.25rem; height: 1.25rem;
            accent-color: #3b82f6; cursor: pointer;
        }

        /* Custom Copy Button Style */
        .copy-btn {
            opacity: 0.5;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .copy-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
    </style>
</head>
